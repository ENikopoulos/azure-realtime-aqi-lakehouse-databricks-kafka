name: Python CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run Ruff
        run: |
          ruff check producer spark tests

      - name: Check Python syntax
        run: |
          python -m compileall -q producer spark

      - name: Run unit tests
        run: |
          python -m pytest -q

      - name: Validate ADF JSON exports
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          json_files = list(Path("adf").rglob("*.json"))

          if not json_files:
              raise RuntimeError("No ADF JSON files were found.")

          for path in json_files:
              with path.open(encoding="utf-8") as file:
                  json.load(file)

              print(f"Validated {path}")
          PY